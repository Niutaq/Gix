apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gix-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gix-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gix-backend-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gix-backend

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gix-backend-network-policy
spec:
  podSelector:
    matchLabels:
      app: gix-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: gix-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: gix-redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: gix-nats
      ports:
        - protocol: TCP
          port: 4222
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS traffic for scrapers
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
