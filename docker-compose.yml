# docker-compose.yml
services:
  # Database
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: gix-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - gix-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: gix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # NATS JetStream
  nats:
    image: nats:latest
    container_name: gix-nats
    command: "-js"
    ports:
      - "4222:4222"
    restart: unless-stopped

  # Elasticsearch for full-text and geo search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: gix-es
    environment:
      - node.name=es01
      - cluster.name=gix-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # Kibana for visual exploration of ES data
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: gix-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # App
  app:
    container_name: gix-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - tmp
            - vendor
            - .git
        - action: rebuild
          path: go.mod
        - action: rebuild
          path: go.sum
        - action: rebuild
          path: Dockerfile
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      NATS_URL: "nats://nats:4222"
      DD_TRACE_ENABLED: "false"
    depends_on:
      - db
      - redis
      - nats
    restart: unless-stopped

  # FinOps Cost Estimator (Microservice)
  cost-estimator:
    container_name: gix-cost-estimator
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./cost-estimator"]
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    depends_on:
      - db
      - nats
    restart: unless-stopped

volumes:
  gix-db-data:
  es-data: