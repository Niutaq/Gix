name: Build and Deploy Backend

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            niutaq/gix-backend:${{ github.sha }}
            niutaq/gix-backend:latest

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: niutaq/gix-backend:${{ github.sha }}
        run: cosign sign --yes "${TAGS}@${DIGEST}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save gix-pool-cluster

      - name: Apply Infrastructure and Policies
        run: |
          kubectl apply -f k8s/02-db.yaml
          kubectl apply -f k8s/03-redis.yaml
          kubectl apply -f k8s/08-policies.yaml
          kubectl rollout restart deployment gix-redis
          
      - name: Update Kubernetes Deployment
        run: |
          kubectl apply -f k8s/04-backend.yaml
          kubectl set image deployment/gix-backend gix-backend=niutaq/gix-backend:${{ github.sha }}
          kubectl rollout restart deployment gix-backend
          kubectl rollout status deployment/gix-backend
