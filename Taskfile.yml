version: "3"

tasks:
  default:
    desc: "Default task (lint and proto)"
    cmds:
      - task: lint
      - task: proto

  proto:
    desc: "Generates Go code from Protobuf files"
    cmds:
      - protoc --go_out=. --go-drpc_out=. api/proto/v1/rates.proto

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  test:
    desc: "Run unit tests"
    cmds:
      - go test -race -v ./...

  vuln:
    desc: "Run govulncheck on Go code"
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  run:backend:
    desc: "Run backend locally"
    dotenv: ['.env']
    env:
      REDIS_URL: "redis://localhost:6379/0"
      NATS_URL: "nats://localhost:4222"
      DD_TRACE_ENABLED: "false"
    cmds:
      - DATABASE_URL="postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:5433/$POSTGRES_DB?sslmode=disable" go run ./cmd/gix-server

  run:estimator:
    desc: "Run cost estimator locally"
    dotenv: ['.env']
    env:
      NATS_URL: "nats://localhost:4222"
      DD_TRACE_ENABLED: "false"
    cmds:
      - DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5433/${POSTGRES_DB}?sslmode=disable" go run ./cmd/cost-estimator

  start:gui:local:
    desc: "Start GUI pointing to local API"
    cmds:
      - go run cmd/gix/main.go -api "http://localhost:8080"

  start:gui:remote:
    desc: "Start GUI pointing to remote DigitalOcean API"
    cmds:
      - go run cmd/gix/main.go -api "http://165.227.246.100:8080"

  deploy:do:
    desc: "Build, push and deploy backend to DigitalOcean K8s"
    cmds:
      - docker buildx build --platform linux/amd64 -t niutaq/gix-backend:latest --push .
      - helm upgrade --install gix-backend charts/gix -f charts/gix/values.yaml

  docker:build:
    desc: "Build docker image"
    cmds:
      - docker buildx build --platform linux/amd64 -t niutaq/gix-backend:latest .

  k8s:deploy:
    desc: "Deploy backend to Kubernetes"
    cmds:
      - kubectl apply -f k8s/04-backend.yaml
      - kubectl rollout restart deployment gix-backend

  clean:
    desc: "Clean temporary and build files"
    cmds:
      - rm -rf Gix.app gix-bin trace.out

  build:macos:
    desc: "Builds a valid .app package for macOS"
    cmds:
      - rm -rf Gix.app gix-bin
      - go build -o gix-bin ./cmd/gix
      - mkdir -p Gix.app/Contents/MacOS
      - mkdir -p Gix.app/Contents/Resources
      - mv gix-bin Gix.app/Contents/MacOS/
      - cp appicon.png Gix.app/Contents/Resources/icon.png
      - |
        cat <<EOF > Gix.app/Contents/MacOS/Gix
        #!/bin/bash
        DIR=\$(cd "\$(dirname "\$0")"; pwd)
        cd "\$DIR"
        exec "./gix-bin" "\$@"
        EOF
      - |
        cat <<EOF > Gix.app/Contents/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Gix</string>
            <key>CFBundleIconFile</key>
            <string>icon.png</string>
            <key>CFBundleIdentifier</key>
            <string>com.niutaq.gix</string>
            <key>CFBundleName</key>
            <string>Gix</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSLocationWhenInUseUsageDescription</key>
            <string>Gix needs your location to find the nearest currency exchange offices.</string>
        </dict>
        </plist>
        EOF
      - chmod +x Gix.app/Contents/MacOS/Gix
      - chmod +x Gix.app/Contents/MacOS/gix-bin
      - xattr -cr Gix.app
      - codesign --force --deep --sign - Gix.app

  helm:lint:
    desc: "Lint Helm chart (using Docker if helm is missing)"
    cmds:
      - |
        if command -v helm &> /dev/null; then
          helm lint charts/gix
        else
          echo "Helm not found locally, using Docker..."
          docker run --rm -v $(pwd):/apps -w /apps alpine/helm lint charts/gix
        fi

  trivy:scan:
    desc: "Scan project for vulnerabilities using Trivy (using Docker if trivy is missing)"
    cmds:
      - |
        if command -v trivy &> /dev/null; then
          trivy fs --severity CRITICAL,HIGH .
        else
          echo "Trivy not found locally, using Docker..."
          docker run --rm -v $(pwd):/root/.cache/ -v $(pwd):/project aquasec/trivy fs --severity CRITICAL,HIGH /project
        fi
